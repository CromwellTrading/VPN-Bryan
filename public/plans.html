<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Cuba | Secure Edge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-grey: #f8f9fa;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border-color: #dadce0;
            --surface: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Soporte para Modo Oscuro (Preferencia de Google) */
        @media (prefers-color-scheme: dark) {
            :root {
                --google-blue: #8ab4f8;
                --google-grey: #202124;
                --text-primary: #e8eaed;
                --text-secondary: #9aa0a6;
                --border-color: #3c4043;
                --surface: #2d2e31;
            }
            body { background-color: #202124; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--google-grey); 
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- SUTIL FONDO ANIMADO --- */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4; pointer-events: none;
        }

        /* --- LOADER PRO --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--google-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- LAYOUT --- */
        .navbar {
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--surface);
            border-bottom: 1px solid var(--border-color); z-index: 100;
        }
        .logo { font-family: 'Google Sans', sans-serif; font-weight: 500; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--google-blue); }

        .container { max-width: 1000px; margin: 0 auto; padding: 3rem 1.5rem; }

        .hero { text-align: center; margin-bottom: 4rem; }
        .hero h1 { font-family: 'Google Sans', sans-serif; font-size: 2.5rem; font-weight: 400; margin-bottom: 1rem; letter-spacing: -0.5px; }
        .hero p { color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* --- GRIDS & CARDS --- */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: var(--transition);
            display: flex; flex-direction: column;
            position: relative;
        }
        .card:hover { 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            border-color: var(--google-blue);
            transform: translateY(-4px);
        }

        .card.featured { border: 2px solid var(--google-blue); }
        .badge {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--google-blue); color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }

        .card-header { margin-bottom: 1.5rem; }
        .card-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .card-price { font-size: 2rem; font-weight: 500; font-family: 'Google Sans'; }
        .card-price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }

        .features-list { list-style: none; margin-bottom: 2rem; flex-grow: 1; }
        .features-list li { margin: 12px 0; color: var(--text-secondary); font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
        .features-list li i { color: #34a853; font-size: 0.8rem; }

        /* --- BOTONES MATERIAL --- */
        .btn-google {
            background: var(--google-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Google Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            font-size: 1rem;
        }
        .btn-google:hover { filter: brightness(1.1); box-shadow: 0 2px 6px rgba(26,115,232,0.3); }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--google-blue);
        }
        .btn-outline:hover { background: rgba(26,115,232,0.04); }

        /* --- FOOTER --- */
        .footer { text-align: center; margin-top: 4rem; padding-bottom: 2rem; border-top: 1px solid var(--border-color); padding-top: 2rem; }
        .btn-exit { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(32, 33, 36, 0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: var(--transition); z-index: 2000;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal {
            background: var(--surface); width: 90%; max-width: 450px;
            border-radius: 16px; padding: 2rem; transform: scale(0.9); transition: var(--transition);
        }
        .modal-overlay.active .modal { transform: scale(1); }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2rem; }
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: var(--text-secondary); font-family: 'Google Sans';">Cargando consola...</p>
</div>

<div id="canvas-container"></div>

<nav class="navbar">
    <div class="logo">
        <i class="fas fa-shield-halved"></i>
        <span>VPN Cuba Pro</span>
    </div>
    <div style="font-size: 0.8rem; color: var(--text-secondary);">
        <i class="fas fa-circle" style="color: #34a853; font-size: 0.5rem;"></i> Nodo: Miami-01
    </div>
</nav>

<div class="container">
    <header class="hero">
        <h1>Conectividad sin límites</h1>
        <p>Infraestructura global optimizada para Cuba. Privacidad de grado empresarial con la simplicidad de Google.</p>
    </header>

    <div class="plans-grid" id="plansGrid">
        </div>

    <footer class="footer">
        <button class="btn-exit" onclick="Telegram.WebApp.close()">Cerrar sesión de forma segura</button>
    </footer>
</div>

<div id="paymentModal" class="modal-overlay">
    <div class="modal">
        <h2 style="font-family: 'Google Sans'; margin-bottom: 1rem;" id="mTitle">Plan Seleccionado</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Confirme su suscripción para proceder al despliegue del túnel cifrado.</p>
        <div id="mPrice" style="font-size: 1.5rem; font-weight: 500; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;"></div>
        <button class="btn-google" id="btnConfirm">Confirmar y Pagar</button>
        <button class="btn-exit" style="width: 100%; margin-top: 1rem; text-decoration: none;" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

    // Animación de Fondo Minimalista (Sutiles orbes de luz)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(2, 32, 32);
    const material = new THREE.MeshBasicMaterial({ color: 0x1a73e8, wireframe: true, transparent: true, opacity: 0.05 });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);
    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.002;
        sphere.rotation.x += 0.001;
        renderer.render(scene, camera);
    }
    animate();

    // Lógica de Negocio
    const plans = [
        { name: "Prueba", id: "trial", price: "0 CUP", val: "Gratis", features: ["1 hora de acceso", "Ubicación aleatoria", "Soporte básico"] },
        { name: "Estándar", id: "basico", price: "800 CUP", val: "1.6 USDT", features: ["30 días de acceso", "Streaming HD", "2 Dispositivos"] },
        { name: "Premium", id: "premium", price: "1,200 CUP", val: "2.5 USDT", featured: true, features: ["Acceso VIP", "Latencia Gaming", "5 Dispositivos", "IP Dedicada"] },
        { name: "Anual", id: "anual", price: "15,000 CUP", val: "30 USDT", features: ["12 meses (Ahorro 20%)", "Todo lo de Premium", "Prioridad en red"] }
    ];

    function render() {
        const grid = document.getElementById('plansGrid');
        grid.innerHTML = plans.map(p => `
            <div class="card ${p.featured ? 'featured' : ''}">
                ${p.featured ? '<div class="badge">RECOMENDADO</div>' : ''}
                <div class="card-header">
                    <div class="card-title">${p.name}</div>
                    <div class="card-price">${p.price} <span>/ ${p.val}</span></div>
                </div>
                <ul class="features-list">
                    ${p.features.map(f => `<li><i class="fas fa-check"></i> ${f}</li>`).join('')}
                </ul>
                <button class="btn-google ${p.featured ? '' : 'btn-outline'}" onclick="openModal('${p.id}')">
                    ${p.id === 'trial' ? 'Probar ahora' : 'Seleccionar'}
                </button>
            </div>
        `).join('');
    }

    window.openModal = (id) => {
        const p = plans.find(x => x.id === id);
        document.getElementById('mTitle').innerText = `Plan ${p.name}`;
        document.getElementById('mPrice').innerText = `${p.price} (Aprox. ${p.val})`;
        document.getElementById('paymentModal').classList.add('active');
        
        document.getElementById('btnConfirm').onclick = () => {
            const uid = Telegram.WebApp.initDataUnsafe?.user?.id || "USER_ID";
            const url = p.id === 'trial' ? 'how.html' : 'payment.html';
            window.location.href = `${url}?plan=${p.id}&userId=${uid}`;
        };
    };

    window.closeModal = () => {
        document.getElementById('paymentModal').classList.remove('active');
    };

    // Quitar loader
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
        }, 1000);
    });

    render();
    try { Telegram.WebApp.ready(); Telegram.WebApp.expand(); } catch(e) {}
</script>
</body>
</html>
